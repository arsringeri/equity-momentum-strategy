# ============================================================
# Momentum Backtest Platform Configuration
# ============================================================

# --- Kite Connect credentials ---
# api_key: your Zerodha API key (same as in C:/bot)
kite.api_key=YOUR_API_KEY_HERE

# access_token is read at runtime from C:/Input/store.txt (line 2)
# Same file shared with C:/bot — no duplicate token setup needed.
kite.token_file=C:/Input/store.txt

# --- Portfolio settings ---
# Initial capital in INR
portfolio.initial_capital=1000000.0

# Number of top stocks to select (equal weight = 1/top_n per stock)
portfolio.top_n=20

# Rebalance day of week (MONDAY, TUESDAY, ... FRIDAY)
portfolio.rebalance_day=MONDAY

# --- Data settings ---
# Universe file (relative to project root)
data.universe_file=data/nifty500.csv

# Extra days of history to fetch before fromDate to compute 1-year return
# 380 calendar days ~ 252 trading days
data.lookback_extra_days=380

# Milliseconds between Kite API calls (rate limiting)
data.api_call_delay_ms=100

# --- Logging ---
log.level=INFO
