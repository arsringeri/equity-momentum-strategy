# ============================================================
# Momentum Backtest Platform Configuration
# ============================================================

# --- Kite Connect credentials ---
# API key and user ID are NOT stored here.
# They are read from secrets.properties (same file as C:/bot).
#
# Token (access_token / public_token) is decrypted at runtime from
# C:\Input\store.enc using a Swing password dialog — identical to C:/bot.
# The same store.enc is shared; no separate login required.

# --- Portfolio settings ---
# Initial capital in INR
portfolio.initial_capital=1000000.0

# Number of top stocks to select (equal weight = 1/top_n per stock)
portfolio.top_n=20

# Rebalance day of week: MONDAY | TUESDAY | WEDNESDAY | THURSDAY | FRIDAY
portfolio.rebalance_day=MONDAY

# --- Data settings ---
# Universe file (relative to working directory)
data.universe_file=data/nifty500.csv

# Calendar days to look back before fromDate to ensure 252 trading days of history
data.lookback_extra_days=380

# Milliseconds to sleep between Kite API calls (rate limiting)
data.api_call_delay_ms=100

# --- Logging ---
log.level=INFO
